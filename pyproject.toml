[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "notes-app"
version = "0.1.0"
description = "AsciiDoc note-taking application"
requires-python = ">=3.13"
readme = "README.md"

# Runtime dependencies. Build step 8 introduces the UI layer, which is
# the first runtime caller of ``gi.repository``; ``PyGObject`` is the
# Python-side binding that makes that import work. The GTK 4 typelib
# itself is a system package (``gir1.2-gtk-4.0`` on Debian/Ubuntu, the
# equivalents elsewhere) — distributing system packages is out of
# scope for ``pyproject.toml``. SQLite is in the standard library.
# ``GtkSourceView`` bindings join the list at build step 10 when the
# editor pane lands.
dependencies = [
    "PyGObject>=3.50",
]

[project.scripts]
notes-app = "notes_app.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["notes_app*"]

# PyGObject does not ship type stubs or a ``py.typed`` marker, so
# ``from gi.repository import Gtk`` always trips mypy's import-untyped
# check. The override below is project-wide so each future module that
# refers to GTK does not need a per-file ``# type: ignore`` comment.
# This is configuration of the type checker — not suppression of real
# type errors in our own code.
[[tool.mypy.overrides]]
module = ["gi.*"]
ignore_missing_imports = true
